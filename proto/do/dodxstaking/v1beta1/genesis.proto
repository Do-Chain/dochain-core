syntax = "proto3";
package do.dodxstaking.v1beta1;

import "do/dodxstaking/v1beta1/stake.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/Daviddochain/dochain-core/v4/x/dodxstaking/types";

// GenesisState defines x/dodxstaking genesis state.
message GenesisState {
  repeated StakeRecord stakes = 1 [(gogoproto.nullable) = false];
  bool governance_enabled = 2;
  repeated RewardAmountRecord reward_accumulators = 3 [(gogoproto.nullable) = false];
  repeated RewardAmountRecord reward_pools = 4 [(gogoproto.nullable) = false];
  repeated AccountRewardAmountRecord reward_debts = 5 [(gogoproto.nullable) = false];
  repeated AccountRewardAmountRecord pending_rewards = 6 [(gogoproto.nullable) = false];
}

// RewardAmountRecord stores module-level reward accounting values.
message RewardAmountRecord {
  string denom = 1;
  string amount = 2;
}

// AccountRewardAmountRecord stores per-account reward accounting values.
message AccountRewardAmountRecord {
  string address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string denom = 2;
  string amount = 3;
}
