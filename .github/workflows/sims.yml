name: Sims
# Sims workflow runs multiple types of simulations (nondeterminism, import-export, after-import, multi-seed-short)
# This workflow will run on all Pull Requests, if a .go, .mod or .sum file have been changed
on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}-sims
  cancel-in-progress: true
jobs:
  cleanup-runs:
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/master'"
    steps:
      - uses: rokroskar/workflow-run-cleanup-action@master
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip-sims')"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          check-latest: true
      - name: Display go version
        run: go version
      - run: make build

  install-runsim:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          check-latest: true
      - name: Display go version
        run: go version
      - name: Install runsim
        run: export GO111MODULE="on" && go install github.com/cosmos/tools/cmd/runsim@v1.0.0
      - uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-runsim-binary

  test-sim-nondeterminism:
    runs-on: ubuntu-latest
    needs: [build, install-runsim]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          check-latest: true
      - name: Display go version
        run: go version
      - uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            **/**.go
            go.mod
            go.sum
      - uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-runsim-binary
        if: env.GIT_DIFF || startsWith(github.ref, 'refs/heads/release/')
      - name: test-sim-nondeterminism
        run: |
          make test-sim-nondeterminism
        if: env.GIT_DIFF || startsWith(github.ref, 'refs/heads/release/')

  test-sim-import-export:
    runs-on: ubuntu-latest
    needs: [build, install-runsim]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          check-latest: true
      - name: Display go version
        run: go version
      - uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            **/**.go
            go.mod
            go.sum
          SET_ENV_NAME_INSERTIONS: 1
          SET_ENV_NAME_LINES: 1
      - uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-runsim-binary
        if: env.GIT_DIFF || startsWith(github.ref, 'refs/heads/release/')
      - name: test-sim-import-export
        run: |
          make test-sim-import-export
        if: env.GIT_DIFF || startsWith(github.ref, 'refs/heads/release/')
      - name: Print simulation logs on failure
        if: failure()
        shell: bash
        run: |
          for log in /tmp/sim-logs-*/*.stdout /tmp/sim-logs-*/*.stderr; do
            [ -f "$log" ] || continue
            echo "::group::$log"
            tail -n 400 "$log"
            echo "::endgroup::"
          done

  test-sim-after-import:
    runs-on: ubuntu-latest
    needs: [build, install-runsim]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          check-latest: true
      - name: Display go version
        run: go version
      - uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            **/**.go
            go.mod
            go.sum
          SET_ENV_NAME_INSERTIONS: 1
          SET_ENV_NAME_LINES: 1
      - uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-runsim-binary
        if: env.GIT_DIFF || startsWith(github.ref, 'refs/heads/release/')
      - name: test-sim-after-import
        run: |
          make test-sim-after-import
        if: env.GIT_DIFF || startsWith(github.ref, 'refs/heads/release/')
      - name: Print simulation logs on failure
        if: failure()
        shell: bash
        run: |
          for log in /tmp/sim-logs-*/*.stdout /tmp/sim-logs-*/*.stderr; do
            [ -f "$log" ] || continue
            echo "::group::$log"
            tail -n 400 "$log"
            echo "::endgroup::"
          done

  test-sim-multi-seed-short:
    runs-on: ubuntu-latest
    needs: [build, install-runsim]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          check-latest: true
      - name: Display go version
        run: go version
      - uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            **/**.go
            go.mod
            go.sum
          SET_ENV_NAME_INSERTIONS: 1
          SET_ENV_NAME_LINES: 1
      - uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-runsim-binary
        if: env.GIT_DIFF || startsWith(github.ref, 'refs/heads/release/')
      - name: test-sim-multi-seed-short
        run: |
          make test-sim-multi-seed-short
        if: env.GIT_DIFF || startsWith(github.ref, 'refs/heads/release/')
      - name: Print simulation logs on failure
        if: failure()
        shell: bash
        run: |
          for log in /tmp/sim-logs-*/*.stdout /tmp/sim-logs-*/*.stderr; do
            [ -f "$log" ] || continue
            echo "::group::$log"
            tail -n 400 "$log"
            echo "::endgroup::"
          done






